<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="IE=11">
    <link rel="stylesheet" href="./css/viscast.css" type="text/css">
    <link rel="stylesheet" href="./css/transform.css" type="text/css">
    <link rel="stylesheet" href="./css/basic.css" type="text/css">
    <link rel="stylesheet" href="./css/color-dark.css" type="text/css">

    <link rel="stylesheet" href="./css/debug.css" type="text/css">

<body>
    <div id="container">
        <div id="header">
            <div class="header-l">
                <div class="logo">
                    <img src="./images/logo_user.svg" />
                </div>
            </div>
            <div class="title">
                <p class="title-text"></p>
            </div>
            <div class="header-r">
                <div id="lxip:Date">M/D</div>
                <div id="lxip:Time">HH:MM</div>
                <div class="logo">
                    <img src="./images/logo_quick_white.svg" />
                </div>
            </div>
        </div>
        <div id="main">
            <!-- direction -->
            <div class="direction">
                <!-- data -->
                <div class="data">
                    <div class="title">
                        <p class="title-text">東証概況</p>
                    </div>
                </div>
                <!-- data -->
                <div class="data">
                    <div class="element">
                        <div class="element-data">
                            <p class="element-data-text">&lt;NQN&gt;◇東証寄り付き 小幅高 円安で自動車や機械に買い 2023/02/15 09:19</p>
                        </div>
                    </div>
                </div>
                <!-- data -->
                <div class="data">
                    <div class="element">
                        <div class="element-data">
                            <p class="element-data-text">15日前場寄り付きの東京株式市場で日経平均株価は続伸し、前日に比べ50円ほど高い２万7600円台半ばで推移している。上げ幅は一時、100円を超えた。14日発表の１月の米消費者物価指数（ＣＰＩ）の伸び率が市場予想を上回った。米連邦準備理事会（ＦＲＢ）の利上げ継続の観測が強まり、円相場は一時１月初旬以来となる１ﾄﾞﾙ＝133円台まで下落した。円安が支えとなり日本株に買いが先行している。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="footer">
        </div>
    </div>

</body>

</html>
